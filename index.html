<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập ôn bài</title>
  <style>
    :root {
      --bg: #10131a;
      --panel: #f7f2e8;
      --ink: #202026;
      --muted: #68636c;
      --line: #ddd2c1;
      --blue: #2563eb;
      --blue-dark: #1744aa;
      --green: #15803d;
      --pink: #d94686;
      --yellow: #f8c146;
      --shadow: 0 24px 60px rgba(0, 0, 0, .32);
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 16%, rgba(248, 193, 70, .55), transparent 24%),
        radial-gradient(circle at 86% 18%, rgba(217, 70, 134, .32), transparent 22%),
        linear-gradient(135deg, #10131a 0%, #18233b 48%, #103026 100%);
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .shell {
      width: min(940px, 100%);
      display: grid;
      grid-template-columns: 1fr 390px;
      min-height: 560px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(247, 242, 232, .96);
      box-shadow: var(--shadow);
    }

    .intro {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 34px;
      color: #fff;
      background:
        linear-gradient(rgba(16, 19, 26, .18), rgba(16, 19, 26, .52)),
        url("data:image/svg+xml,%3Csvg width='900' height='700' viewBox='0 0 900 700' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='900' height='700' fill='%232563eb'/%3E%3Cg fill='none' stroke='%23f8c146' stroke-width='5' stroke-linecap='round' opacity='.82'%3E%3Cpath d='M116 185h180v120H116zM510 95h215v135H510zM402 398h230v150H402z'/%3E%3Cpath d='M296 245h106M725 162h70M510 463H332M220 305v114M632 473h82'/%3E%3Ccircle cx='116' cy='185' r='16' fill='%23f8c146'/%3E%3Ccircle cx='296' cy='305' r='16' fill='%23f8c146'/%3E%3Ccircle cx='510' cy='95' r='16' fill='%23f8c146'/%3E%3Ccircle cx='632' cy='548' r='16' fill='%23f8c146'/%3E%3C/g%3E%3Cg fill='%23ffffff' opacity='.18'%3E%3Ccircle cx='74' cy='84' r='38'/%3E%3Ccircle cx='796' cy='594' r='58'/%3E%3Ccircle cx='768' cy='80' r='24'/%3E%3C/g%3E%3C/svg%3E");
      background-size: cover;
      background-position: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--yellow);
      color: #111827;
      box-shadow: 0 10px 22px rgba(0, 0, 0, .2);
    }

    .intro h1 {
      max-width: 520px;
      margin: 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: .96;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 420px;
      margin: 16px 0 0;
      color: rgba(255, 255, 255, .84);
      font-size: 16px;
      line-height: 1.6;
    }

    .login {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 34px;
      background: var(--panel);
    }

    .login h2 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .login .sub {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      color: #3d3940;
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      font: inherit;
      padding: 13px 14px;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .14);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
    }

    .tiny-link {
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font: inherit;
      font-weight: 800;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
      box-shadow: 0 12px 28px rgba(37, 99, 235, .26);
    }

    button:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .note {
      min-height: 22px;
      margin: 4px 0 0;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
    }

    .footer {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .footer strong {
      color: var(--pink);
    }

    @media (max-width: 760px) {
      body {
        align-items: start;
      }

      .shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .intro {
        min-height: 280px;
        padding: 26px;
      }

      .login {
        padding: 26px;
      }
    }

    @media (max-width: 420px) {
      .row {
        align-items: flex-start;
        flex-direction: column;
      }

      .intro,
      .login {
        padding: 22px;
      }
    }

    /* fantasy RPG skin */
    :root {
      --night: #091322;
      --deep: #17264d;
      --aqua: #56d6c6;
      --aqua-dark: #167c89;
      --gold: #f7d58a;
      --gold-deep: #b78335;
      --rose: #e783b3;
      --paper: rgba(255, 250, 235, .92);
      --glass: rgba(15, 30, 58, .64);
      --shadow: 0 34px 90px rgba(0, 0, 0, .46);
    }

    body {
      position: relative;
      isolation: isolate;
      overflow-x: hidden;
      background:
        linear-gradient(125deg, rgba(9, 19, 34, .98), rgba(31, 54, 104, .94), rgba(20, 75, 76, .9)),
        repeating-linear-gradient(60deg, rgba(247, 213, 138, .06) 0 1px, transparent 1px 80px);
      background-size: 180% 180%, auto;
      animation: skyShift 18s ease-in-out infinite;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      opacity: .8;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, .85) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(247, 213, 138, .75) 0 1px, transparent 1.6px);
      background-size: 92px 92px, 137px 137px;
      background-position: 0 0, 28px 52px;
      animation: starDrift 28s linear infinite;
    }

    body::after {
      opacity: .34;
      background:
        conic-gradient(from 45deg at 20% 30%, transparent 0 18%, rgba(86, 214, 198, .32) 21%, transparent 28% 100%),
        conic-gradient(from 220deg at 76% 70%, transparent 0 12%, rgba(247, 213, 138, .28) 16%, transparent 24% 100%);
      filter: blur(18px);
      animation: auroraSweep 16s ease-in-out infinite alternate;
    }

    .shell {
      position: relative;
      z-index: 2;
      border: 1px solid rgba(247, 213, 138, .62);
      background: linear-gradient(135deg, rgba(255, 250, 235, .9), rgba(231, 244, 255, .86));
      box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, .08) inset;
      animation: riseIn .7s cubic-bezier(.2, .8, .2, 1) both;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(183, 131, 53, .28);
      border-radius: 6px;
      pointer-events: none;
      z-index: 2;
    }

    .intro {
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(8, 19, 36, .22), rgba(10, 23, 44, .7)),
        url("data:image/svg+xml,%3Csvg width='900' height='700' viewBox='0 0 900 700' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='900' height='700' fill='%2317294f'/%3E%3Cg fill='none' stroke='%23f7d58a' stroke-width='3' stroke-linecap='round' opacity='.7'%3E%3Cpath d='M450 92l54 94 108 23-73 82 12 109-101-44-101 44 12-109-73-82 108-23z'/%3E%3Cpath d='M110 164h162v108H110zM588 108h202v126H588zM414 430h244v126H414z'/%3E%3Cpath d='M272 218h91M588 171H470M414 493H270M191 272v134M658 493h83'/%3E%3C/g%3E%3Cg fill='%2356d6c6' opacity='.22'%3E%3Cpath d='M74 98l28 16-28 16-28-16zM796 578l42 24-42 24-42-24zM760 84l20 12-20 12-20-12z'/%3E%3C/g%3E%3C/svg%3E");
      background-size: cover;
      background-position: center;
    }

    .intro::after {
      content: "";
      position: absolute;
      inset: -40%;
      background: linear-gradient(105deg, transparent 42%, rgba(255, 255, 255, .26) 50%, transparent 58%);
      transform: translateX(-45%);
      animation: lightBlade 6s ease-in-out infinite;
    }

    .brand,
    .intro h1,
    .intro p,
    .login {
      position: relative;
      z-index: 3;
    }

    .brand-mark {
      background: linear-gradient(135deg, #fff6cc, var(--gold), #d89a3d);
      box-shadow: 0 0 24px rgba(247, 213, 138, .44), 0 12px 24px rgba(0, 0, 0, .22);
      animation: crestPulse 2.8s ease-in-out infinite;
    }

    .intro h1 {
      text-shadow: 0 4px 24px rgba(0, 0, 0, .34), 0 0 28px rgba(247, 213, 138, .18);
    }

    .login {
      background:
        linear-gradient(180deg, rgba(255, 252, 241, .95), rgba(233, 246, 250, .9)),
        repeating-linear-gradient(135deg, rgba(183, 131, 53, .08) 0 1px, transparent 1px 42px);
      box-shadow: -18px 0 48px rgba(8, 19, 36, .16);
    }

    .login h2 {
      color: #17304f;
      text-shadow: 0 1px 0 rgba(255, 255, 255, .9);
    }

    input {
      border-color: rgba(183, 131, 53, .36);
      background: rgba(255, 253, 247, .9);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .9) inset;
    }

    input:focus {
      border-color: var(--aqua);
      box-shadow: 0 0 0 4px rgba(86, 214, 198, .18), 0 0 22px rgba(247, 213, 138, .18);
    }

    button {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(247, 213, 138, .7);
      background: linear-gradient(135deg, #21798c, #2563eb 50%, #8a5bc8);
      box-shadow: 0 16px 34px rgba(37, 99, 235, .3), 0 0 22px rgba(86, 214, 198, .18);
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0 36%, rgba(255, 255, 255, .45) 48%, transparent 62% 100%);
      transform: translateX(-120%);
      transition: transform .55s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #198596, #1744aa 52%, #7244b4);
      box-shadow: 0 20px 42px rgba(37, 99, 235, .34), 0 0 34px rgba(247, 213, 138, .26);
    }

    button:hover::before {
      transform: translateX(120%);
    }

    .tiny-link {
      color: #1b778f;
    }

    .footer {
      border-top-color: rgba(183, 131, 53, .32);
    }

    .mascot-stage {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .runner {
      --coat: #2b83c6;
      --trim: #f7d58a;
      --hair: #26324a;
      position: absolute;
      left: -120px;
      width: 74px;
      height: 112px;
      filter: drop-shadow(0 14px 16px rgba(0, 0, 0, .28));
      animation: crossField 12s linear infinite;
    }

    .runner-a { bottom: 8%; animation-duration: 13s; }
    .runner-b { bottom: 18%; --coat: #56d6c6; --trim: #f7d58a; --hair: #553b72; animation-delay: -4s; animation-duration: 16s; }
    .runner-c { bottom: 5%; --coat: #e783b3; --trim: #e9f6ff; --hair: #6b452b; animation-delay: -8s; animation-duration: 18s; }
    .runner-d { bottom: 30%; --coat: #ff8f45; --trim: #111827; --hair: #f0c36c; animation-delay: -2s; animation-duration: 19s; transform: scale(.82); }
    .runner-e { bottom: 12%; --coat: #6d5dfc; --trim: #56d6c6; --hair: #1f2937; animation-name: crossFieldBack; animation-delay: -7s; animation-duration: 17s; }
    .runner-f { bottom: 26%; --coat: #2f9e67; --trim: #f7d58a; --hair: #d9ecff; animation-name: crossFieldBack; animation-delay: -11s; animation-duration: 21s; transform: scale(.88); }

    .sprite {
      position: absolute;
      inset: 0;
      animation: hopStep .64s ease-in-out infinite;
    }

    .runner-b .sprite {
      animation-duration: .72s;
    }

    .runner-c .sprite {
      animation-duration: .58s;
    }

    .runner-e .sprite,
    .runner-f .sprite {
      animation-duration: .68s;
    }

    .sprite span,
    .sprite i {
      position: absolute;
      display: block;
    }

    .cape {
      width: 46px;
      height: 52px;
      left: 9px;
      top: 42px;
      border-radius: 18px 12px 22px 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, .18), var(--coat));
      transform: skewY(-8deg);
      animation: capeFlutter .62s ease-in-out infinite alternate;
    }

    .head {
      width: 34px;
      height: 34px;
      left: 23px;
      top: 18px;
      border-radius: 50%;
      background: #ffd7b1;
      border: 2px solid rgba(108, 76, 43, .28);
      z-index: 3;
    }

    .hair {
      width: 39px;
      height: 20px;
      left: 20px;
      top: 14px;
      border-radius: 20px 20px 10px 10px;
      background: var(--hair);
      z-index: 4;
    }

    .hat {
      width: 52px;
      height: 18px;
      left: 13px;
      top: 4px;
      border-radius: 50% 50% 10px 10px;
      background: linear-gradient(135deg, #fff7cf, var(--trim));
      border: 1px solid rgba(96, 67, 26, .22);
      z-index: 5;
      transform: rotate(-6deg);
    }

    .runner-d .hat {
      height: 14px;
      top: 8px;
      border-radius: 4px 4px 12px 12px;
      background: linear-gradient(135deg, #192033, #111827);
    }

    .runner-d .hat::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 17px;
      top: -12px;
      border-radius: 50%;
      background: #ffcf4a;
      box-shadow: 0 0 14px rgba(255, 207, 74, .45);
    }

    .runner-e .hat {
      width: 54px;
      height: 14px;
      top: 9px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff7cf, #f7d58a);
    }

    .runner-e .hat::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 18px;
      left: 15px;
      top: -15px;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      background: #f7d58a;
    }

    .runner-f .hat {
      width: 44px;
      height: 32px;
      left: 17px;
      top: -4px;
      border-radius: 26px 26px 12px 12px;
      background: linear-gradient(135deg, #e9f6ff, #9ad8ff);
      transform: rotate(5deg);
    }

    .body {
      width: 38px;
      height: 43px;
      left: 20px;
      top: 49px;
      border-radius: 15px 15px 12px 12px;
      background: linear-gradient(180deg, var(--coat), #1c4f86);
      border: 2px solid rgba(255, 255, 255, .36);
      z-index: 2;
    }

    .scarf {
      width: 42px;
      height: 9px;
      left: 18px;
      top: 48px;
      border-radius: 999px;
      background: var(--trim);
      z-index: 4;
      transform: rotate(-5deg);
    }

    .arm {
      width: 13px;
      height: 38px;
      top: 53px;
      border-radius: 999px;
      background: #ffd7b1;
      transform-origin: 50% 7px;
      z-index: 1;
    }

    .arm-l {
      left: 12px;
      animation: armSwing .52s ease-in-out infinite alternate;
    }

    .arm-r {
      left: 52px;
      animation: armSwing .52s ease-in-out infinite alternate-reverse;
    }

    .leg {
      width: 13px;
      height: 34px;
      top: 84px;
      border-radius: 999px;
      background: #26324a;
      transform-origin: 50% 4px;
      z-index: 1;
    }

    .leg-l {
      left: 26px;
      animation: legKick .52s ease-in-out infinite alternate;
    }

    .leg-r {
      left: 42px;
      animation: legKick .52s ease-in-out infinite alternate-reverse;
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--trim);
      box-shadow: 0 0 16px var(--trim);
      opacity: .8;
      animation: trailSpark 1.2s ease-out infinite;
    }

    .sparkle.s1 { left: -6px; top: 32px; animation-delay: -.2s; }
    .sparkle.s2 { left: -18px; top: 58px; animation-delay: -.58s; }
    .sparkle.s3 { left: -10px; top: 86px; animation-delay: -.92s; }

    .weapon {
      width: 7px;
      height: 58px;
      left: 62px;
      top: 39px;
      border-radius: 999px;
      background: linear-gradient(#fff6cc, var(--trim));
      transform: rotate(-28deg);
      transform-origin: 50% 10%;
      box-shadow: 0 0 14px rgba(247, 213, 138, .38);
      animation: weaponBob .7s ease-in-out infinite alternate;
      z-index: 0;
    }

    .runner-d .weapon {
      width: 9px;
      height: 9px;
      left: 58px;
      top: 44px;
      border-radius: 50%;
      background: #56d6c6;
      box-shadow: 0 0 18px rgba(86, 214, 198, .75), 0 0 0 8px rgba(86, 214, 198, .12);
      animation: orbSpin 1s linear infinite;
    }

    .runner-e .weapon {
      height: 62px;
      background: linear-gradient(#fff, #c7e8ff 42%, var(--trim));
    }

    .runner-f .weapon {
      width: 40px;
      height: 40px;
      left: 52px;
      top: 26px;
      border: 2px solid rgba(247, 213, 138, .84);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(86, 214, 198, .42), transparent 62%);
      transform: rotate(0);
      animation: magicCircle 2.2s linear infinite;
    }

    @keyframes skyShift {
      0%, 100% { background-position: 0% 50%, 0 0; }
      50% { background-position: 100% 50%, 0 0; }
    }

    @keyframes starDrift {
      from { background-position: 0 0, 28px 52px; }
      to { background-position: 92px 184px, 165px 326px; }
    }

    @keyframes auroraSweep {
      from { transform: translate3d(-2%, -1%, 0) scale(1); }
      to { transform: translate3d(2%, 1%, 0) scale(1.05); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: none; }
    }

    @keyframes lightBlade {
      0%, 52% { transform: translateX(-55%) rotate(0deg); opacity: 0; }
      62% { opacity: .8; }
      78%, 100% { transform: translateX(55%) rotate(0deg); opacity: 0; }
    }

    @keyframes crestPulse {
      0%, 100% { transform: translateY(0); filter: brightness(1); }
      50% { transform: translateY(-2px); filter: brightness(1.12); }
    }

    @keyframes crossField {
      0% { transform: translateX(-140px) scale(.86); opacity: 0; }
      8% { opacity: .95; }
      52% { transform: translateX(52vw) scale(1); }
      92% { opacity: .95; }
      100% { transform: translateX(calc(100vw + 160px)) scale(.9); opacity: 0; }
    }

    @keyframes crossFieldBack {
      0% { transform: translateX(calc(100vw + 160px)) scale(.9); opacity: 0; }
      8% { opacity: .95; }
      52% { transform: translateX(42vw) scale(1); }
      92% { opacity: .95; }
      100% { transform: translateX(-150px) scale(.86); opacity: 0; }
    }

    @keyframes hopStep {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      45% { transform: translateY(-18px) rotate(2deg); }
    }

    @keyframes capeFlutter {
      from { transform: skewY(-8deg) translateX(0); }
      to { transform: skewY(8deg) translateX(-5px); }
    }

    @keyframes armSwing {
      from { transform: rotate(34deg); }
      to { transform: rotate(-34deg); }
    }

    @keyframes legKick {
      from { transform: rotate(-26deg); }
      to { transform: rotate(30deg); }
    }

    @keyframes trailSpark {
      0% { transform: translate(0, 0) scale(1); opacity: .85; }
      100% { transform: translate(-36px, 14px) scale(.2); opacity: 0; }
    }

    @keyframes weaponBob {
      from { transform: rotate(-34deg) translateY(0); }
      to { transform: rotate(-20deg) translateY(-5px); }
    }

    @keyframes orbSpin {
      from { transform: rotate(0) scale(1); filter: hue-rotate(0deg); }
