<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trắc nghiệm Hạ tầng mạng</title>
<style>
  :root{
    --bg:#0e1419; --panel:#161e26; --panel2:#1c2730; --line:#27333d;
    --ink:#e7eef3; --muted:#8aa0ad; --faint:#5d7280;
    --signal:#2fd6c4; --signal-dim:#1d9c90;
    --good:#36c98a; --good-bg:#12281f; --good-line:#1f5a40;
    --bad:#f0656b; --bad-bg:#2a1518; --bad-line:#6b2a30;
    --accent:#ffce5c;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono','Menlo',Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{padding:18px 16px 60px;line-height:1.5}
  .wrap{max-width:760px;margin:0 auto}

  header{margin-bottom:18px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--signal)}
  h1{font-size:23px;font-weight:700;margin:4px 0 0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}

  /* scoreboard */
  .score{display:flex;gap:10px;margin:16px 0 14px;flex-wrap:wrap}
  .stat{flex:1;min-width:84px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .stat .n{font-family:var(--mono);font-size:20px;font-weight:600;line-height:1}
  .stat .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-top:5px}
  .stat.correct .n{color:var(--good)}
  .stat.wrong .n{color:var(--bad)}
  .stat.acc .n{color:var(--signal)}

  .bar{height:5px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-bottom:16px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--signal-dim),var(--signal));transition:width .35s ease}

  /* navigator */
  .navgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:8px}
  .navgrid button{aspect-ratio:1;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:7px;font-family:var(--mono);font-size:11px;cursor:pointer;padding:0;transition:.12s}
  .navgrid button:hover{border-color:var(--signal-dim);color:var(--ink)}
  .navgrid button.cur{outline:2px solid var(--signal);outline-offset:1px;color:var(--ink)}
  .navgrid button.ok{background:var(--good-bg);border-color:var(--good-line);color:var(--good)}
  .navgrid button.no{background:var(--bad-bg);border-color:var(--bad-line);color:var(--bad)}
  details.navwrap{margin-bottom:18px}
  details.navwrap summary{cursor:pointer;color:var(--muted);font-size:12.5px;font-family:var(--mono);
    list-style:none;padding:6px 0;user-select:none}
  details.navwrap summary::-webkit-details-marker{display:none}
  details.navwrap summary:before{content:"▸ ";color:var(--signal)}
  details.navwrap[open] summary:before{content:"▾ "}

  /* question card */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 18px}
  .qhead{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .qnum{font-family:var(--mono);font-size:12px;color:var(--bg);background:var(--signal);
    padding:3px 8px;border-radius:6px;font-weight:600}
  .topic{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .qtext{font-size:16.5px;font-weight:600;line-height:1.45;margin-bottom:16px}

  .opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;
    background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:11px;padding:12px 13px;margin-bottom:9px;cursor:pointer;font-size:14.5px;
    font-family:inherit;line-height:1.4;transition:.12s}
  .opt:hover:not(:disabled){border-color:var(--signal-dim)}
  .opt:disabled{cursor:default}
  .opt .key{font-family:var(--mono);font-weight:600;color:var(--muted);flex:none;width:18px}
  .opt.is-correct{background:var(--good-bg);border-color:var(--good-line)}
  .opt.is-correct .key{color:var(--good)}
  .opt.is-wrong{background:var(--bad-bg);border-color:var(--bad-line)}
  .opt.is-wrong .key{color:var(--bad)}
  .opt .mark{margin-left:auto;font-family:var(--mono);font-size:13px;flex:none}
  .opt.is-correct .mark{color:var(--good)}
  .opt.is-wrong .mark{color:var(--bad)}

  .explain{margin-top:14px;border-radius:11px;padding:13px 14px;font-size:13.8px;line-height:1.55;
    border:1px solid var(--line);background:#11191f;display:none}
  .explain.show{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .explain .verdict{font-weight:700;font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .explain.v-ok .verdict{color:var(--good)}
  .explain.v-no .verdict{color:var(--bad)}
  .explain b{color:var(--accent);font-weight:600}

  /* controls */
  .controls{display:flex;gap:10px;margin-top:16px;align-items:center}
  .controls button{font-family:inherit;font-size:14px;border-radius:10px;padding:11px 16px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:.12s;font-weight:500}
  .controls button:hover{border-color:var(--signal-dim)}
  .controls button:disabled{opacity:.35;cursor:default}
  .controls .next{margin-left:auto;background:var(--signal);color:var(--bg);border-color:var(--signal);font-weight:600}
  .controls .next:hover{background:var(--signal-dim);border-color:var(--signal-dim)}

  .toolbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .toolbar button{font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;background:transparent;
    border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:7px 11px;cursor:pointer;transition:.12s}
  .toolbar button:hover{color:var(--ink);border-color:var(--signal-dim)}

  .done{text-align:center;padding:18px;color:var(--muted);font-size:13.5px}
  @media(max-width:480px){
    .navgrid{grid-template-columns:repeat(10,1fr);gap:4px}
    .navgrid button{font-size:9.5px;border-radius:5px}
    h1{font-size:20px}
    .qtext{font-size:15.5px}
  }

  /* refreshed theme to match the login page */
  :root{
    --bg:#10131a; --panel:#fffdf8; --panel2:#f7f2e8; --line:#ddd2c1;
    --ink:#202026; --muted:#68636c; --faint:#8c8490;
    --signal:#2563eb; --signal-dim:#1744aa;
    --good:#15803d; --good-bg:#eaf8ef; --good-line:#9bd8b0;
    --bad:#b42318; --bad-bg:#fff0ed; --bad-line:#f1aaa2;
    --accent:#f8c146; --pink:#d94686;
    --shadow:0 22px 55px rgba(0,0,0,.22);
  }
  html,body{min-height:100%;color:var(--ink)}
  body{
    padding:28px 16px 56px;
    background:
      radial-gradient(circle at 12% 10%, rgba(248,193,70,.55), transparent 24%),
      radial-gradient(circle at 88% 8%, rgba(217,70,134,.28), transparent 22%),
      linear-gradient(135deg,#10131a 0%,#18233b 48%,#103026 100%);
  }
  .wrap{width:min(980px,100%);max-width:none}
  header{
    position:relative;overflow:hidden;margin-bottom:16px;padding:32px 34px;border-radius:8px;color:#fff;
    border:1px solid rgba(255,255,255,.18);box-shadow:var(--shadow);
    background:
      linear-gradient(120deg,rgba(37,99,235,.96),rgba(16,48,38,.94)),
      url("data:image/svg+xml,%3Csvg width='900' height='360' viewBox='0 0 900 360' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23f8c146' stroke-width='4' stroke-linecap='round' opacity='.6'%3E%3Cpath d='M80 92h150v86H80zM520 52h180v105H520zM358 226h210v96H358z'/%3E%3Cpath d='M230 132h94M520 104H402M568 274h92M155 178v78'/%3E%3Ccircle cx='80' cy='92' r='13' fill='%23f8c146'/%3E%3Ccircle cx='230' cy='178' r='13' fill='%23f8c146'/%3E%3Ccircle cx='520' cy='52' r='13' fill='%23f8c146'/%3E%3Ccircle cx='568' cy='322' r='13' fill='%23f8c146'/%3E%3C/g%3E%3C/svg%3E");
    background-size:cover;background-position:center;
  }
  header:before{
    content:"A+";display:grid;place-items:center;width:38px;height:38px;margin-bottom:18px;border-radius:8px;
    background:var(--accent);color:#111827;font-weight:900;box-shadow:0 12px 26px rgba(0,0,0,.22);
  }
  .eyebrow{color:rgba(255,255,255,.76);font-weight:800}
  h1{max-width:680px;font-size:clamp(32px,5vw,56px);line-height:1;margin:7px 0 0;letter-spacing:0;font-weight:900}
  .sub{max-width:640px;color:rgba(255,255,255,.82);font-size:14px;margin-top:12px}
  .score{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0 14px}
  .stat{min-width:0;background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:8px;padding:14px 15px;box-shadow:0 10px 28px rgba(0,0,0,.12)}
  .stat .n{font-size:24px;font-weight:800;color:var(--ink)}
  .stat .l{color:var(--faint);font-weight:800}
  .bar{height:8px;background:rgba(255,253,248,.32);border:1px solid rgba(255,255,255,.2);border-radius:99px;margin-bottom:14px}
  .bar > i{background:linear-gradient(90deg,var(--accent),var(--pink),var(--signal))}
  details.navwrap{
    margin-bottom:16px;padding:13px 14px;border:1px solid var(--line);border-radius:8px;
    background:rgba(255,253,248,.96);box-shadow:0 10px 28px rgba(0,0,0,.12);
  }
  details.navwrap summary{color:var(--muted);font-weight:800}
  details.navwrap summary:before{content:"+ ";color:var(--signal)}
  details.navwrap[open] summary:before{content:"- "}
  .navgrid{gap:6px;margin:12px 0 4px}
  .navgrid button{
    border-color:var(--line);background:var(--panel);color:var(--muted);border-radius:7px;
    font-weight:800;transition:.14s;
  }
  .navgrid button:hover{border-color:var(--signal);color:var(--signal);transform:translateY(-1px)}
  .navgrid button.cur{outline:3px solid rgba(37,99,235,.22);border-color:var(--signal);color:var(--signal);background:#eef4ff}
  .card{background:var(--panel);border-color:var(--line);border-radius:8px;padding:24px;box-shadow:var(--shadow)}
  .qhead{align-items:center;margin-bottom:14px}
  .qnum{color:#111827;background:var(--accent);padding:5px 10px;border-radius:7px;font-weight:900}
  .topic{color:var(--faint);font-weight:800}
  .qtext{font-size:18px;font-weight:800;line-height:1.5;margin-bottom:18px;color:#191922}
  .opt{
    background:var(--panel2);border-color:var(--line);color:var(--ink);border-radius:8px;
    padding:14px 15px;margin-bottom:10px;font-size:15px;line-height:1.45;
    transition:transform .14s ease,border-color .14s ease,background .14s ease,box-shadow .14s ease;
  }
  .opt:hover:not(:disabled){border-color:var(--signal);background:#eef4ff;box-shadow:0 10px 22px rgba(37,99,235,.12);transform:translateY(-1px)}
  .opt .key{
    color:var(--signal);width:24px;height:24px;border-radius:7px;display:grid;place-items:center;
    background:#e8efff;font-size:12px;font-weight:900;
  }
  .opt.is-correct .key{color:#fff;background:var(--good)}
  .opt.is-wrong .key{color:#fff;background:var(--bad)}
  .opt .mark{font-size:15px;font-weight:900}
  .explain{border-radius:8px;padding:15px 16px;font-size:14px;line-height:1.6;background:#fff9ea}
  .explain.v-ok{background:var(--good-bg);border-color:var(--good-line)}
  .explain.v-no{background:var(--bad-bg);border-color:var(--bad-line)}
  .explain .verdict{font-weight:900}
  .explain b{color:#9a5d00;font-weight:900}
  .controls button{
    border-radius:8px;padding:12px 16px;background:var(--panel);color:var(--ink);
    font-weight:800;box-shadow:0 8px 18px rgba(0,0,0,.1);
  }
  .controls button:hover{border-color:var(--signal);color:var(--signal);transform:translateY(-1px)}
  .controls button:disabled{transform:none}
  .controls .next{background:var(--signal);color:#fff;border-color:var(--signal);box-shadow:0 12px 28px rgba(37,99,235,.25)}
  .controls .next:hover{background:var(--signal-dim);border-color:var(--signal-dim);color:#fff}
  .toolbar button{
    background:rgba(255,253,248,.92);border-color:var(--line);border-radius:8px;
    color:var(--muted);padding:9px 12px;font-weight:800;
  }
  .toolbar button:hover{color:var(--signal);border-color:var(--signal);background:#eef4ff}
  #celebration{
    position:fixed;inset:0;z-index:20;pointer-events:none;
  }
  @media(max-width:720px){
    body{padding:16px 12px 42px}
    header{padding:24px 22px}
    .score{grid-template-columns:repeat(2,1fr)}
    .card{padding:19px 16px}
    .qtext{font-size:16px}
  }
  @media(max-width:480px){
    h1{font-size:32px}
    .stat{padding:12px}
    .navgrid button{font-size:9px}
    .controls{align-items:stretch}
    .controls button{flex:1;padding-inline:12px}
  }

  /* fantasy RPG skin */
  :root{
    --bg:#091322; --panel:rgba(255,250,235,.94); --panel2:rgba(239,248,249,.88); --line:rgba(183,131,53,.34);
    --ink:#1d2634; --muted:#65707e; --faint:#87909c;
    --signal:#2b83c6; --signal-dim:#186178;
    --good:#17835d; --good-bg:#e6f8ed; --good-line:#93d9af;
    --bad:#b8373f; --bad-bg:#fff0ef; --bad-line:#efaaa7;
    --accent:#f7d58a; --pink:#e783b3; --aqua:#56d6c6;
    --shadow:0 32px 82px rgba(0,0,0,.36);
  }
  html,body{background:var(--bg)}
  body{
    position:relative;isolation:isolate;overflow-x:hidden;
    background:
      linear-gradient(125deg,rgba(9,19,34,.98),rgba(31,54,104,.94),rgba(20,75,76,.9)),
      repeating-linear-gradient(60deg,rgba(247,213,138,.055) 0 1px,transparent 1px 86px);
    background-size:180% 180%,auto;
    animation:skyShift 18s ease-in-out infinite;
  }
  body:before,
  body:after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
  }
  body:before{
    opacity:.72;
    background-image:
      radial-gradient(circle,rgba(255,255,255,.82) 0 1px,transparent 1.4px),
      radial-gradient(circle,rgba(247,213,138,.7) 0 1px,transparent 1.7px);
    background-size:92px 92px,137px 137px;
    background-position:0 0,28px 52px;
    animation:starDrift 30s linear infinite;
  }
  body:after{
    opacity:.28;filter:blur(18px);
    background:
      conic-gradient(from 45deg at 18% 24%,transparent 0 18%,rgba(86,214,198,.32) 21%,transparent 28% 100%),
      conic-gradient(from 220deg at 80% 78%,transparent 0 12%,rgba(247,213,138,.26) 16%,transparent 24% 100%);
    animation:auroraSweep 16s ease-in-out infinite alternate;
  }
  .wrap{animation:riseIn .7s cubic-bezier(.2,.8,.2,1) both}
  header{
    border-color:rgba(247,213,138,.62);
    box-shadow:var(--shadow),0 0 0 1px rgba(255,255,255,.08) inset;
    background:
      linear-gradient(135deg,rgba(8,19,36,.3),rgba(10,23,44,.76)),
      url("data:image/svg+xml,%3Csvg width='980' height='390' viewBox='0 0 980 390' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='980' height='390' fill='%2317294f'/%3E%3Cg fill='none' stroke='%23f7d58a' stroke-width='3' stroke-linecap='round' opacity='.68'%3E%3Cpath d='M490 56l42 74 84 18-57 64 9 87-78-35-78 35 9-87-57-64 84-18z'/%3E%3Cpath d='M86 98h164v92H86zM660 74h210v110H660zM384 272h240v82H384z'/%3E%3Cpath d='M250 144h98M660 128H528M384 313H248M164 190v96M624 313h92'/%3E%3C/g%3E%3Cg fill='%2356d6c6' opacity='.2'%3E%3Cpath d='M56 64l25 15-25 15-25-15zM890 284l36 21-36 21-36-21z'/%3E%3C/g%3E%3C/svg%3E");
    background-size:cover;background-position:center;
  }
  header:after{
    content:"";position:absolute;inset:-45%;
    background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.23) 50%,transparent 58%);
    transform:translateX(-55%);
    animation:lightBlade 6.4s ease-in-out infinite;
  }
  header>*{position:relative;z-index:1}
  header:before{
    background:linear-gradient(135deg,#fff6cc,var(--accent),#d89a3d);
    box-shadow:0 0 24px rgba(247,213,138,.44),0 12px 24px rgba(0,0,0,.22);
    animation:crestPulse 2.8s ease-in-out infinite;
  }
  h1{text-shadow:0 4px 24px rgba(0,0,0,.34),0 0 28px rgba(247,213,138,.18)}
  .sub span[style*="--good"]{color:#8ef0ba!important}
  .sub span[style*="--bad"]{color:#ffb4bd!important}
  .score{perspective:900px}
  .stat{
    position:relative;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,252,241,.96),rgba(231,246,250,.9));
    border-color:rgba(247,213,138,.48);
    box-shadow:0 16px 38px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.9) inset;
    transition:transform .18s ease,box-shadow .18s ease;
  }
  .stat:before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(120deg,transparent 0 40%,rgba(255,255,255,.42) 50%,transparent 60% 100%);
    transform:translateX(-120%);
    transition:transform .6s ease;
  }
  .stat:hover{transform:translateY(-3px) rotateX(2deg);box-shadow:0 22px 46px rgba(0,0,0,.24),0 0 24px rgba(247,213,138,.16)}
  .stat:hover:before{transform:translateX(120%)}
  .bar{
    height:10px;border-color:rgba(247,213,138,.36);background:rgba(255,250,235,.28);
    box-shadow:0 8px 24px rgba(0,0,0,.18) inset;
  }
  .bar>i{
    background:linear-gradient(90deg,var(--accent),var(--aqua),var(--pink),var(--signal));
    background-size:220% 100%;
    animation:progressFlow 3s linear infinite;
    box-shadow:0 0 18px rgba(86,214,198,.38);
  }
  details.navwrap,
  .card{
    border-color:rgba(247,213,138,.5);
    background:
      linear-gradient(180deg,rgba(255,252,241,.97),rgba(232,246,250,.92)),

    box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,.9) inset;
  }
  details.navwrap[open]{animation:softOpen .26s ease both}
  .navgrid button{
    border-color:rgba(183,131,53,.28);background:rgba(255,253,247,.92);
    box-shadow:0 1px 0 rgba(255,255,255,.86) inset;
  }
  .navgrid button:hover{
    border-color:var(--aqua);color:#176a78;background:#edfafa;
    box-shadow:0 0 18px rgba(86,214,198,.18);
  }
  .navgrid button.cur{
    border-color:var(--accent);color:#8a5a12;background:#fff6d8;
    outline:3px solid rgba(247,213,138,.26);
  }
  .card{position:relative;overflow:hidden;animation:cardArrival .28s ease both}
  .card:before{
    content:"";position:absolute;inset:9px;border:1px solid rgba(183,131,53,.22);border-radius:6px;pointer-events:none;
  }
  .qnum{
    background:linear-gradient(135deg,#fff6cc,var(--accent),#d99b3d);
    box-shadow:0 8px 18px rgba(183,131,53,.2),0 0 16px rgba(247,213,138,.28);
  }
  .topic{color:#7c6b91}
  .qtext{color:#17233a;text-shadow:0 1px 0 rgba(255,255,255,.8)}
  .opt{
    position:relative;overflow:hidden;
    background:rgba(255,253,247,.84);border-color:rgba(183,131,53,.28);
    box-shadow:0 8px 20px rgba(16,30,58,.08),0 1px 0 rgba(255,255,255,.88) inset;
  }
  .opt:before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(110deg,transparent 0 38%,rgba(255,255,255,.42) 50%,transparent 62% 100%);
    transform:translateX(-120%);
    transition:transform .5s ease;
  }
  .opt:hover:not(:disabled){
    border-color:var(--aqua);background:#edfafa;
    box-shadow:0 16px 32px rgba(21,102,124,.16),0 0 20px rgba(86,214,198,.18);
  }
  .opt:hover:not(:disabled):before{transform:translateX(120%)}
  .opt .key{
    background:linear-gradient(135deg,#e9fbff,#d9f0ff);
    color:#176a78;border:1px solid rgba(86,214,198,.28);
  }
  .opt.is-correct{
    animation:answerPop .36s cubic-bezier(.2,.9,.25,1) both;
    box-shadow:0 0 0 1px rgba(23,131,93,.18),0 16px 34px rgba(23,131,93,.18);
  }
  .opt.is-wrong{animation:wrongShake .26s ease both}
  .explain{
    box-shadow:0 12px 28px rgba(0,0,0,.08),0 1px 0 rgba(255,255,255,.84) inset;
  }
  .controls button,
  .toolbar button{
    position:relative;overflow:hidden;border-color:rgba(247,213,138,.52);

Q.forEach((item,i)=>{ if(!item.topic) item.topic = topicOf(i); });
const TOTAL=Q.length;
document.querySelector('#total-title').textContent=TOTAL;
shuffleChoices();

const KEY=['A','B','C','D'];
let cur=0;
const answers=new Array(Q.length).fill(null); // null=chưa làm, ngược lại lưu index đã chọn

const $=s=>document.querySelector(s);
const card=$('#card'), navgrid=$('#navgrid');

// build navigator
Q.forEach((_,i)=>{
  const b=document.createElement('button');
  b.textContent=i+1;
  b.onclick=()=>{cur=i;render();const d=document.querySelector('details.navwrap');};
  navgrid.appendChild(b);
});

function updateScore(){
  const done=answers.filter(a=>a!==null).length;
  const ok=answers.filter((a,i)=>a!==null&&a===Q[i].a).length;
  const no=done-ok;
  $('#s-done').innerHTML=done+`<span style="color:var(--faint);font-size:13px">/${TOTAL}</span>`;
  $('#s-ok').textContent=ok;
  $('#s-no').textContent=no;
  $('#s-acc').textContent=done? Math.round(ok/done*100)+'%' : '—';
  $('#prog').style.width=(done/Q.length*100)+'%';
  // navigator colors
  navgrid.querySelectorAll('button').forEach((b,i)=>{
    b.classList.remove('ok','no','cur');
    if(answers[i]!==null) b.classList.add(answers[i]===Q[i].a?'ok':'no');
    if(i===cur) b.classList.add('cur');
  });
  $('#navlabel').textContent = done? `Bảng câu hỏi · đã làm ${done}/${TOTAL}` : 'Mở bảng câu hỏi (nhảy nhanh)';
}

function render(){
  const item=Q[cur];
  const chosen=answers[cur];
  const answered=chosen!==null;
  let html=`<div class="qhead"><span class="qnum">Câu ${cur+1}</span><span class="topic">${item.topic || topicOf(cur)}</span></div>`;
  html+=`<div class="qtext">${item.q}</div>`;
  item.o.forEach((opt,i)=>{
    let cls='opt';let mark='';
    if(answered){
      if(i===item.a){cls+=' is-correct';mark='✓';}
      else if(i===chosen){cls+=' is-wrong';mark='✗';}
    }
    html+=`<button class="${cls}" ${answered?'disabled':''} data-i="${i}">
      <span class="key">${KEY[i]}</span><span>${opt}</span><span class="mark">${mark}</span></button>`;
  });
  if(answered){
    const right=chosen===item.a;
    html+=`<div class="explain show ${right?'v-ok':'v-no'}">
      <div class="verdict">${right?'✓ Chính xác':'✗ Chưa đúng — đáp án: '+KEY[item.a]}</div>
      <div>${item.e}</div></div>`;
  }
  card.innerHTML=html;
  if(!answered){
    card.querySelectorAll('.opt').forEach(b=>{
      b.onclick=()=>{
        const picked=+b.dataset.i;
        answers[cur]=picked;
        if(picked===item.a) celebrate();
        render();
        updateScore();
      };
    });
  }
  $('#prev').disabled=cur===0;
  $('#next').textContent = cur===Q.length-1 ? 'Hết câu' : 'Tiếp →';
  $('#next').disabled=cur===Q.length-1;
  updateScore();
  card.scrollIntoView({block:'nearest'});
}

$('#prev').onclick=()=>{if(cur>0){cur--;render();}};
$('#next').onclick=()=>{if(cur<Q.length-1){cur++;render();}};

$('#jumpWrong').onclick=()=>{
  for(let k=1;k<=Q.length;k++){const i=(cur+k)%Q.length;
    if(answers[i]!==null&&answers[i]!==Q[i].a){cur=i;render();return;}}
  flash('#jumpWrong','Không có câu sai 🎉');
};
$('#jumpUnans').onclick=()=>{
  for(let k=1;k<=Q.length;k++){const i=(cur+k)%Q.length;
    if(answers[i]===null){cur=i;render();return;}}
  flash('#jumpUnans','Đã làm hết ✓');
};
$('#reset').onclick=()=>{
  shuffleQuestions();
  shuffleChoices();
  answers.fill(null);
  cur=0;
  render();
  flash('#reset','Đã xáo câu mới ✓');
};
function flash(sel,msg){const b=$(sel);const t=b.textContent;b.textContent=msg;setTimeout(()=>b.textContent=t,1400);}
function shuffleQuestions(){
  for(let i=Q.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [Q[i],Q[j]]=[Q[j],Q[i]];
  }
}
function shuffleChoices(){
  Q.forEach(item=>{
    const choices=item.o.map((text,index)=>({text,correct:index===item.a}));
    for(let i=choices.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [choices[i],choices[j]]=[choices[j],choices[i]];
    }
    item.o=choices.map(choice=>choice.text);
    item.a=choices.findIndex(choice=>choice.correct);
  });
}

const fxCanvas=document.querySelector('#celebration');
const fx=fxCanvas.getContext('2d');
let sparks=[];
let fxRunning=false;
function sizeFx(){
  fxCanvas.width=window.innerWidth*devicePixelRatio;
  fxCanvas.height=window.innerHeight*devicePixelRatio;
  fx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
window.addEventListener('resize',sizeFx);
sizeFx();
function celebrate(){
  const colors=['#f8c146','#2563eb','#d94686','#15803d','#ffffff'];
  const originX=window.innerWidth*(.25+Math.random()*.5);
  const originY=window.innerHeight*(.22+Math.random()*.28);
  for(let i=0;i<70;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    sparks.push({
      x:originX,y:originY,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-1.2,
      life:55+Math.random()*18,
      age:0,
      size:2+Math.random()*3,
      color:colors[Math.floor(Math.random()*colors.length)]
    });
  }
  if(!fxRunning) requestAnimationFrame(runFx);
}
function runFx(){
  fxRunning=true;
  fx.clearRect(0,0,window.innerWidth,window.innerHeight);
  sparks=sparks.filter(p=>p.age<p.life);
  sparks.forEach(p=>{
    p.age++;
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=.055;
    const alpha=1-p.age/p.life;
    fx.globalAlpha=alpha;
    fx.fillStyle=p.color;
    fx.beginPath();
    fx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
    fx.fill();
  });
  fx.globalAlpha=1;
  if(sparks.length) requestAnimationFrame(runFx);
  else fxRunning=false;
}

render();
</script>
